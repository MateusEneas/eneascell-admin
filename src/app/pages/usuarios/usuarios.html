<div class="page-container">

  <div class="page-header">
    <h2>Usuários</h2>
    <button mat-raised-button color="primary" (click)="abrirDialogNovo()">
      <mat-icon>person_add</mat-icon>
      Novo Usuário
    </button>
  </div>

  @if (carregando()) {
    <div class="loading">
      <mat-spinner />
    </div>
  } @else if (erro()) {
    <div class="erro">
      <p>{{ erro() }}</p>
      <button mat-button color="primary" (click)="carregarUsuarios()">
        Tentar novamente
      </button>
    </div>
  } @else {
    <table mat-table [dataSource]="usuarios()" class="tabela">

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let usuario">{{ usuario.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let usuario">{{ usuario.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Perfil</th>
        <td mat-cell *matCellDef="let usuario">
          <mat-chip [class]="usuario.role === 'ADMIN' ? 'chip-admin' : 'chip-user'">
            {{ usuario.role === 'ADMIN' ? 'Administrador' : 'Vendedor' }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let usuario">
          <button mat-icon-button color="primary" (click)="abrirDialogEditar(usuario)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletar(usuario.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

    </table>
  }

</div>
