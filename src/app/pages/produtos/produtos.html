<div class="page-container">

  <div class="page-header">
    <h2>Produtos</h2>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Novo Produto
    </button>
  </div>

  @if (carregando()) {
    <div class="loading">
      <mat-spinner />
    </div>
  } @else if (erro()) {
    <div class="erro">
      <p>{{ erro() }}</p>
      <button mat-button color="primary" (click)="carregarProdutos()">
        Tentar novamente
      </button>
    </div>
  } @else {
    <table mat-table [dataSource]="produtos()" class="tabela">

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let produto">{{ produto.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let produto">
          {{ produto.preco | currency:'BRL' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="quantidade">
        <th mat-header-cell *matHeaderCellDef>Quantidade</th>
        <td mat-cell *matCellDef="let produto">{{ produto.quantidade }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let produto">
          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

    </table>
  }

</div>
