<div class="login-container">

  <mat-card class="login-card">

    <mat-card-content>

      <h2>EneasCell</h2>
      <p>Painel Administrativo</p>

      <form class="login-form" [formGroup]="loginForm" (ngSubmit)="entrar()">

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" placeholder="seu@email.com" formControlName="email" />
          <mat-error>Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" placeholder="********" formControlName="senha" />
          <mat-error>Senha obrigatória</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"> Entrar</button>

      </form>
    </mat-card-content>

  </mat-card>

</div>
