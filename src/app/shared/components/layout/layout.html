<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" opened class="sidenav">

    <div class="sidenav-header">
      <h3>EneasCell</h3>
      <p>Admin Panel</p>
    </div>

    <mat-nav-list>

      <a mat-list-item routerLink="/produtos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Produtos</span>
      </a>

      <a mat-list-item routerLink="/usuarios" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Usuários</span>
      </a>

      <a mat-list-item routerLink="/categorias" routerLinkActive="active-link">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categorias</span>
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">

    <mat-toolbar class="toolbar">
      <span>Painel Administrativo</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
